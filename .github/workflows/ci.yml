name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: inventory
          POSTGRES_PASSWORD: inventory
          POSTGRES_DB: inventory
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U inventory -d inventory"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://inventory:inventory@localhost:5432/inventory
      DIAGRAMS_DATABASE_URL: postgresql+asyncpg://inventory:inventory@localhost:5432/inventory
      WAREHOUSE_DATABASE_URL: postgresql+asyncpg://inventory:inventory@localhost:5432/inventory
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Backend tests
        run: |
          python -m pytest -q backend/tests

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps
        run: |
          npm ci --prefix frontend

      - name: Frontend tests
        run: |
          npm run test --prefix frontend
